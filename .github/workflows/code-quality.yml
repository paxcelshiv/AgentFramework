name: Code Quality & Build Verification

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build Project
        run: mvn clean compile -DskipTests=true

      - name: Run FindBugs (SpotBugs)
        run: mvn spotbugs:check || true

      - name: Check Dependencies
        run: mvn dependency:check

  test-compile:
    name: Test Compilation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Compile Tests
        run: mvn test-compile

      - name: Check Test Files
        run: |
          echo "Test files compiled successfully"
          find target/test-classes -name "*.class" | wc -l

  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build for SonarQube
        run: mvn clean package -DskipTests

      - name: SonarQube Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true

  docs:
    name: Documentation Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check README
        run: |
          if [ ! -f README.md ]; then
            echo "❌ README.md not found"
            exit 1
          fi
          echo "✅ README.md found"

      - name: Check pom.xml
        run: |
          if [ ! -f pom.xml ]; then
            echo "❌ pom.xml not found"
            exit 1
          fi
          echo "✅ pom.xml found"

      - name: Verify Project Structure
        run: |
          required_dirs=("src/main/java/com/demoblaze/pages" "src/main/java/com/demoblaze/utils" "src/test/java/com/demoblaze/tests")
          for dir in "${required_dirs[@]}"; do
            if [ ! -d "$dir" ]; then
              echo "❌ Missing directory: $dir"
              exit 1
            fi
          done
          echo "✅ All required directories present"

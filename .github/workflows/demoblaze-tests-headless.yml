name: Demoblaze Tests - Headless Mode

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'pom.xml'
      - '.github/workflows/demoblaze-tests-headless.yml'
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  headless-test:
    name: Headless Test Execution
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Install Playwright Browsers
        run: |
          mvn exec:java -Dexec.mainClass="com.microsoft.playwright.CLI" -Dexec.args="install" -q

      - name: Run Tests in Headless Mode
        run: |
          mvn clean test -e
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '0'

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: headless-screenshots
          path: screenshots/
          retention-days: 7

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: headless-logs
          path: logs/
          retention-days: 7

      - name: Test Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Headless Test Report
          path: 'target/surefire-reports/*.xml'
          reporter: 'java-junit'
          fail-on-error: false

      - name: Comment PR with Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const logPath = 'logs/demoblaze-automation.log';
            let comment = '## 🤖 Demoblaze Test Results\n\n';
            
            if (fs.existsSync(logPath)) {
              const logs = fs.readFileSync(logPath, 'utf8');
              const passedTests = (logs.match(/SCENARIO.*COMPLETED SUCCESSFULLY/g) || []).length;
              const failedTests = (logs.match(/Error in Scenario/g) || []).length;
              
              comment += `| Status | Count |\n`;
              comment += `|--------|-------|\n`;
              comment += `| ✅ Passed | ${passedTests} |\n`;
              comment += `| ❌ Failed | ${failedTests} |\n\n`;
            }
            
            comment += `**Artifacts:**\n`;
            comment += `- 📸 [Screenshots](../actions/runs/${context.runId})\n`;
            comment += `- 📝 [Logs](../actions/runs/${context.runId})\n`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            })
        continue-on-error: true
